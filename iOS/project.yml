name: HyaloApp
options:
  bundleIdPrefix: org.gnu.hyalo
  deploymentTarget:
    iOS: "26.0"

packages:
  Hyalo:
    path: ..

targets:
  HyaloApp:
    type: application
    platform: iOS
    sources:
      - HyaloApp/Sources
    resources:
      - HyaloApp/Resources
    dependencies:
      - package: Hyalo
        product: HyaloKit
        embed: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.gnu.hyalo
      PRODUCT_NAME: Hyalo
      SWIFT_VERSION: "5.0"
      INFOPLIST_FILE: Info.plist
      SWIFT_OBJC_BRIDGING_HEADER: HyaloApp/BridgingHeader.h
      LIBRARY_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../../hyalo-feedstock-unified/emacs/src"
        - "$(SRCROOT)/../../hyalo-feedstock-unified/ios-sim-deps/lib"
      HEADER_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../../hyalo-feedstock-unified/emacs/src"
        - "$(SRCROOT)/../../hyalo-feedstock-unified/ios"
      # Device (iphoneos): link real libemacs.a and all native deps
      "OTHER_LDFLAGS[sdk=iphoneos*]":
        - "-force_load"
        - "$(SRCROOT)/../../hyalo-feedstock-unified/emacs/src/libemacs.a"
        - "-lxml2"
        - "-ljansson"
        - "-lgmp"
        - "-lgnutls"
        - "-lnettle"
        - "-ltasn1"
        - "-lz"
        - "-liconv"
        - "-framework UIKit"
        - "-framework CoreGraphics"
        - "-framework CoreText"
        - "-framework QuartzCore"
      # Simulator: stubs provided by HyaloEmacsStubs — no libemacs.a
      "OTHER_LDFLAGS[sdk=iphonesimulator*]":
        - "-framework UIKit"
        - "-framework CoreGraphics"
        - "-framework CoreText"
        - "-framework QuartzCore"
