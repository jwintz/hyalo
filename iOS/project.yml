name: HyaloApp
options:
  bundleIdPrefix: org.gnu.hyalo
  deploymentTarget:
    iOS: "17.0"

targets:
  HyaloApp:
    type: application
    platform: iOS
    sources:
      - HyaloApp/Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.gnu.hyalo
      PRODUCT_NAME: Hyalo
      INFOPLIST_FILE: Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "6.0"
      LIBRARY_SEARCH_PATHS:
        - "$(inherited)"
        - "$(PROJECT_DIR)/../../hyalo-feedstock-unified/emacs/src"
      HEADER_SEARCH_PATHS:
        - "$(inherited)"
        - "$(PROJECT_DIR)/../../hyalo-feedstock-unified/emacs/src"
        - "$(PROJECT_DIR)/../../hyalo-feedstock-unified/ios"
      OTHER_LDFLAGS:
        - "-lemacs"
        - "-framework"
        - "UIKit"
        - "-framework"
        - "Foundation"
        - "-framework"
        - "SwiftUI"
