name: HyaloApp
options:
  bundleIdPrefix: org.gnu.hyalo
  deploymentTarget:
    iOS: "26.0"

packages:
  Hyalo:
    path: ..

targets:
  HyaloKitFramework:
    type: framework
    platform: iOS
    sources:
      - HyaloKitFramework
    dependencies:
      - package: Hyalo
        product: HyaloKit
    settings:
      PRODUCT_NAME: HyaloKitFramework
      PRODUCT_BUNDLE_IDENTIFIER: org.gnu.hyalo.kit
      SWIFT_VERSION: "5.0"
      DEFINES_MODULE: "YES"
      GENERATE_INFOPLIST_FILE: "YES"
      HEADER_SEARCH_PATHS:
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs-build-ios-sim/src
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios
      LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]:
        - $(inherited)
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs-build-ios-sim/src
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios-sim-deps/lib
      LIBRARY_SEARCH_PATHS[sdk=iphoneos*]:
        - $(inherited)
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs/src
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios-deps/lib
      OTHER_LDFLAGS[sdk=iphonesimulator*]:
        - $(inherited)
        - -force_load
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs-build-ios-sim/src/libemacs.a
        - -lxml2
        - -ljansson
        - -lgmp
        - -lgnutls
        - -lnettle
        - -lhogweed
        - -ltasn1
        - -lz
        - -liconv
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios-sim-deps/lib/libtree-sitter-stub.a
        - -ltree-sitter
        - -lsqlite3
      OTHER_LDFLAGS[sdk=iphoneos*]:
        - $(inherited)
        - -force_load
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs-build-ios-device/src/libemacs.a
        - -lxml2
        - -ljansson
        - -lgmp
        - -lgnutls
        - -lnettle
        - -lhogweed
        - -ltasn1
        - -lz
        - -liconv
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios-sim-deps/lib/libtree-sitter-stub.a
        - -ltree-sitter
        - -lsqlite3

  HyaloApp:
    type: application
    platform: iOS
    sources:
      - HyaloApp/Sources
      - path: HyaloApp/Resources/lisp
        type: folder
        buildPhase: resources
      - path: HyaloApp/Resources/etc
        type: folder
        buildPhase: resources
      - path: HyaloApp/Resources/init
        type: folder
        buildPhase: resources
      - path: HyaloApp/Resources/bootstrap-emacs.pdmp
        buildPhase: resources
    dependencies:
      - target: HyaloKitFramework
        embed: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.gnu.hyalo
      PRODUCT_NAME: Hyalo
      SWIFT_VERSION: "5.0"
      INFOPLIST_FILE: Info.plist
      SWIFT_OBJC_BRIDGING_HEADER: HyaloApp/BridgingHeader.h
      ENABLE_DEBUG_DYLIB: "NO"
      HEADER_SEARCH_PATHS:
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/emacs-build-ios-sim/src
        - /Users/jwintz/Syntropment/hyalo-feedstock-unified/ios
