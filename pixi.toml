[workspace]
name = "hyalo"
version = "0.1.0"
description = "A dynamic library loaded by Emacs, providing SwiftUI-powered UI extensions"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[tasks]
# Build the shared library target (debug).
build = "swift build --target HyaloShared"

# Build the dynamic module target (debug) — produces libHyalo.dylib.
build-module = "swift build --target Hyalo"

# Build all targets in release configuration.
build-release = "swift build -c release"

# Run tests.
test = "swift test"

# Build the WidgetKit extension (.appex) from Sources/HyaloWidget/.
build-widget = { cmd = """bash -c 'set -e
SDK=$(xcrun --show-sdk-path)
CONFIG="${1:-debug}"
APPEX=".build/${CONFIG}/HyaloWidget.appex"
rm -rf "$APPEX"
mkdir -p "$APPEX/Contents/MacOS"

OPT_FLAGS=""
if [ "$CONFIG" = "release" ]; then OPT_FLAGS="-O -whole-module-optimization"; fi

swiftc \
  -target arm64-apple-macos26.0 \
  -sdk "$SDK" \
  -framework WidgetKit \
  -framework SwiftUI \
  -parse-as-library \
  -module-name HyaloWidget \
  -emit-executable \
  $OPT_FLAGS \
  -o "$APPEX/Contents/MacOS/HyaloWidget" \
  Sources/HyaloWidget/HyaloWidgetData.swift \
  Sources/HyaloWidget/HyaloTimelineProvider.swift \
  Sources/HyaloWidget/HyaloWidgetViews.swift \
  Sources/HyaloWidget/HyaloWidget.swift

cat > "$APPEX/Contents/Info.plist" << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDevelopmentRegion</key><string>en</string>
    <key>CFBundleDisplayName</key><string>Hyalo Widget</string>
    <key>CFBundleExecutable</key><string>HyaloWidget</string>
    <key>CFBundleIdentifier</key><string>org.gnu.Emacs.HyaloWidget</string>
    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
    <key>CFBundleName</key><string>HyaloWidget</string>
    <key>CFBundlePackageType</key><string>XPC!</string>
    <key>CFBundleShortVersionString</key><string>1.0</string>
    <key>CFBundleVersion</key><string>1</string>
    <key>LSMinimumSystemVersion</key><string>26.0</string>
    <key>NSExtension</key>
    <dict>
        <key>NSExtensionPointIdentifier</key>
        <string>com.apple.widgetkit-extension</string>
    </dict>
</dict>
</plist>
PLIST

codesign --force --sign - --entitlements Sources/HyaloWidget/HyaloWidget.entitlements "$APPEX"
echo "Built: $APPEX"
'""" }

# Install the widget into Emacs.app (the actual host) and register with the system.
install-widget = { cmd = """bash -c 'set -e
APPEX=".build/debug/HyaloWidget.appex"
if [ ! -d "$APPEX" ]; then echo "ERROR: Run pixi run build-widget first."; exit 1; fi

# The host app is Emacs.app from hyalo-feedstock
FEEDSTOCK_DIR="$(cd "$(dirname "$0")/../hyalo-feedstock" 2>/dev/null && pwd || echo "$HOME/Syntropment/hyalo-feedstock")"
HOST=""
for candidate in "$FEEDSTOCK_DIR/emacs-build-macos/nextstep/Emacs.app" "$FEEDSTOCK_DIR/emacs/nextstep/Emacs.app"; do
    if [ -d "$candidate" ]; then HOST="$candidate"; break; fi
done
if [ -z "$HOST" ]; then echo "ERROR: No Emacs.app found in hyalo-feedstock."; exit 1; fi

mkdir -p "$HOST/Contents/PlugIns"
rm -rf "$HOST/Contents/PlugIns/HyaloWidget.appex"
cp -R "$APPEX" "$HOST/Contents/PlugIns/HyaloWidget.appex"

codesign --force --sign - --entitlements Sources/HyaloWidget/HyaloWidget.entitlements "$HOST/Contents/PlugIns/HyaloWidget.appex"

pluginkit -a "$HOST/Contents/PlugIns/HyaloWidget.appex"
pluginkit -e use -i org.gnu.Emacs.HyaloWidget

echo "Installed to: $HOST"
pluginkit -m -p com.apple.widgetkit-extension 2>&1 | grep -i hyalo || echo "(may need app launch to register)"
'""", depends-on = ["build-widget"] }

# Assemble a Hyalo.app bundle embedding Emacs, the Hyalo dylib, widget extension, and icon.
# The bundle structure:
#   Hyalo.app/
#     Contents/
#       MacOS/Emacs          (from feedstock)
#       Frameworks/libHyalo.dylib
#       PlugIns/HyaloWidget.appex
#       Resources/AppIcon.icns
#       Info.plist
package = { cmd = """bash -c 'set -e
VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed "s/^v//" || echo "0.0.0")

FEEDSTOCK="$HOME/Syntropment/hyalo-feedstock"
EMACS_APP="$FEEDSTOCK/emacs-build-macos/nextstep/Emacs.app"
if [ ! -d "$EMACS_APP" ]; then
    echo "ERROR: Emacs.app not found at $EMACS_APP"
    echo "Run pixi run mac_install in hyalo-feedstock first."
    exit 1
fi

BUILD_DIR=".build/release"
DYLIB="$BUILD_DIR/libHyalo.dylib"
if [ ! -f "$DYLIB" ]; then
    echo "ERROR: libHyalo.dylib not found. Run pixi run build-release first."
    exit 1
fi

APP="Hyalo.app"
CONTENTS="$APP/Contents"
rm -rf "$APP"

echo "Copying Emacs.app as base..."
cp -R "$EMACS_APP" "$APP"

mkdir -p "$CONTENTS/Frameworks"
cp "$DYLIB" "$CONTENTS/Frameworks/"

# Copy any companion dylibs that Hyalo links against from the build dir
for lib in "$BUILD_DIR"/libHyaloShared.dylib "$BUILD_DIR"/libKelyphosKit.dylib; do
    [ -f "$lib" ] && cp "$lib" "$CONTENTS/Frameworks/"
done

# Widget extension (built separately via Xcode — copy if present)
WIDGET_APPEX="$BUILD_DIR/HyaloWidget.appex"
if [ -d "$WIDGET_APPEX" ]; then
    mkdir -p "$CONTENTS/PlugIns"
    cp -R "$WIDGET_APPEX" "$CONTENTS/PlugIns/"
fi

# Compile icon from .icon package
ICON_PACKAGE="Hyalo-Default.icon"
if [ -d "$ICON_PACKAGE" ]; then
    echo "Compiling icon..."
    ICON_OUT=$(mktemp -d)
    xcrun actool --compile "$ICON_OUT" \
        --platform macosx \
        --minimum-deployment-target 15.0 \
        --app-icon Hyalo-Default \
        --output-partial-info-plist "$ICON_OUT/Info.plist" \
        "$ICON_PACKAGE" 2>/dev/null || true
    if [ -f "$ICON_OUT/Hyalo-Default.icns" ]; then
        cp "$ICON_OUT/Hyalo-Default.icns" "$CONTENTS/Resources/AppIcon.icns"
    fi
    [ -f "$ICON_OUT/Assets.car" ] && cp "$ICON_OUT/Assets.car" "$CONTENTS/Resources/"
    rm -rf "$ICON_OUT"
fi

# Patch Info.plist with Hyalo identity
/usr/libexec/PlistBuddy -c "Set :CFBundleName Hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier me.jwintz.hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$CONTENTS/Info.plist" 2>/dev/null || true

echo "Packaged: $APP (v$VERSION)"'
""", depends-on = ["build-release", "build-widget"] }

# Create a DMG disk image with the .app and an Applications symlink.
dmg = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Hyalo-${VERSION}.dmg\"; rm -f \"$DMG\"; TEMP=$(mktemp -d); cp -R Hyalo.app \"$TEMP/\"; ln -s /Applications \"$TEMP/Applications\"; hdiutil create -volname Hyalo -srcfolder \"$TEMP\" -ov -format UDZO \"$DMG\"; rm -rf \"$TEMP\"; echo \"Created: $DMG\"'", depends-on = ["package"] }

# Code sign the .app bundle. Set SIGN_IDENTITY env var for distribution signing;
# defaults to ad-hoc ("-") for local testing.
sign = { cmd = "bash -c 'set -e; IDENTITY=\"${SIGN_IDENTITY:--}\"; if [ \"$IDENTITY\" = \"-\" ]; then codesign --force --deep --sign - Hyalo.app; echo \"Ad-hoc signed Hyalo.app\"; else codesign --force --deep --options runtime --sign \"$IDENTITY\" Hyalo.app; echo \"Signed Hyalo.app with: $IDENTITY\"; fi'", depends-on = ["package"] }

# Submit the DMG for Apple notarization.
# Requires: APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID env vars.
notarize = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Hyalo-${VERSION}.dmg\"; if [ ! -f \"$DMG\" ]; then echo \"ERROR: $DMG not found. Run pixi run dmg first.\"; exit 1; fi; if [ -z \"$APPLE_ID\" ] || [ -z \"$APPLE_PASSWORD\" ] || [ -z \"$APPLE_TEAM_ID\" ]; then echo \"ERROR: Set APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID env vars.\"; exit 1; fi; echo \"Submitting $DMG for notarization...\"; xcrun notarytool submit \"$DMG\" --apple-id \"$APPLE_ID\" --password \"$APPLE_PASSWORD\" --team-id \"$APPLE_TEAM_ID\" --wait; echo \"Stapling...\"; xcrun stapler staple \"$DMG\"; echo \"Notarized: $DMG\"'" }

# Generate a changelog from git log since the last tag.
changelog = "bash -c 'TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\"); if [ -z \"$TAG\" ]; then echo \"# Changelog\"; echo \"\"; git log --pretty=format:\"- %s (%h)\" --no-merges; else echo \"# Changelog since $TAG\"; echo \"\"; git log \"${TAG}..HEAD\" --pretty=format:\"- %s (%h)\" --no-merges; fi'"

# Build and launch Emacs with Hyalo module loaded.
run = { cmd = "bash -c 'FEEDSTOCK=\"$HOME/Syntropment/hyalo-feedstock\"; EMACS=\"$FEEDSTOCK/emacs-build-macos/nextstep/Emacs.app/Contents/MacOS/Emacs\"; if [ ! -x \"$EMACS\" ]; then echo \"ERROR: Emacs not found at $EMACS\"; exit 1; fi; DYLIB=\".build/debug/libHyalo.dylib\"; echo \"Launching Emacs with Hyalo...\"; \"$EMACS\" --load \"$DYLIB\" 2>&1 || \"$EMACS\"'", depends-on = ["build-module"] }

# Remove all build artifacts.
distclean = "rm -rf .build Hyalo.app Hyalo-*.dmg DerivedData build build-ios && echo 'distclean complete'"
