[workspace]
name = "hyalo"
version = "0.1.0"
description = "A dynamic library loaded by Emacs, providing SwiftUI-powered UI extensions"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[tasks]
# Build all targets (debug) — SwiftPM is already incremental.
build = "swift build"

# Alias for naming consistency across projects.
build-if-needed = "swift build"

# Build all targets in release configuration.
build-release = "swift build -c release"

# Run tests.
test = "swift test"

# Assemble a Hyalo.app bundle embedding Emacs, the Hyalo dylib, and icon.
# The bundle structure:
#   Hyalo.app/
#     Contents/
#       MacOS/Emacs          (from feedstock)
#       Frameworks/libHyalo.dylib
#       Resources/AppIcon.icns
#       Info.plist
package = { cmd = """bash -c 'set -e
VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed "s/^v//" || echo "0.0.0")

FEEDSTOCK="$HOME/Syntropment/hyalo-feedstock"
EMACS_APP="$FEEDSTOCK/emacs-build-macos/nextstep/Emacs.app"
if [ ! -d "$EMACS_APP" ]; then
    echo "ERROR: Emacs.app not found at $EMACS_APP"
    echo "Run pixi run mac_install in hyalo-feedstock first."
    exit 1
fi

BUILD_DIR=".build/release"
DYLIB="$BUILD_DIR/libHyalo.dylib"
if [ ! -f "$DYLIB" ]; then
    echo "ERROR: libHyalo.dylib not found. Run pixi run build-release first."
    exit 1
fi

APP="Hyalo.app"
CONTENTS="$APP/Contents"
rm -rf "$APP"

echo "Copying Emacs.app as base..."
cp -R "$EMACS_APP" "$APP"

mkdir -p "$CONTENTS/Frameworks"
cp "$DYLIB" "$CONTENTS/Frameworks/"

# Copy any companion dylibs that Hyalo links against from the build dir
for lib in "$BUILD_DIR"/libHyaloShared.dylib "$BUILD_DIR"/libKelyphosKit.dylib; do
    [ -f "$lib" ] && cp "$lib" "$CONTENTS/Frameworks/"
done

# Compile icon from .icon package
ICON_PACKAGE="Hyalo-Default.icon"
if [ -d "$ICON_PACKAGE" ]; then
    echo "Compiling icon..."
    ICON_OUT=$(mktemp -d)
    xcrun actool --compile "$ICON_OUT" \
        --platform macosx \
        --minimum-deployment-target 15.0 \
        --app-icon Hyalo-Default \
        --output-partial-info-plist "$ICON_OUT/Info.plist" \
        "$ICON_PACKAGE" 2>/dev/null || true
    if [ -f "$ICON_OUT/Hyalo-Default.icns" ]; then
        cp "$ICON_OUT/Hyalo-Default.icns" "$CONTENTS/Resources/AppIcon.icns"
    fi
    [ -f "$ICON_OUT/Assets.car" ] && cp "$ICON_OUT/Assets.car" "$CONTENTS/Resources/"
    rm -rf "$ICON_OUT"
fi

# Patch Info.plist with Hyalo identity
/usr/libexec/PlistBuddy -c "Set :CFBundleName Hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier me.jwintz.hyalo" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$CONTENTS/Info.plist" 2>/dev/null || true
/usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$CONTENTS/Info.plist" 2>/dev/null || true

echo "Packaged: $APP (v$VERSION)"'
""", depends-on = ["build-release"] }

# Create a DMG disk image with the .app and an Applications symlink.
dmg = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Hyalo-${VERSION}.dmg\"; rm -f \"$DMG\"; TEMP=$(mktemp -d); cp -R Hyalo.app \"$TEMP/\"; ln -s /Applications \"$TEMP/Applications\"; hdiutil create -volname Hyalo -srcfolder \"$TEMP\" -ov -format UDZO \"$DMG\"; rm -rf \"$TEMP\"; echo \"Created: $DMG\"'", depends-on = ["package"] }

# Code sign the .app bundle. Set SIGN_IDENTITY env var for distribution signing;
# defaults to ad-hoc ("-") for local testing.
sign = { cmd = "bash -c 'set -e; IDENTITY=\"${SIGN_IDENTITY:--}\"; if [ \"$IDENTITY\" = \"-\" ]; then codesign --force --deep --sign - Hyalo.app; echo \"Ad-hoc signed Hyalo.app\"; else codesign --force --deep --options runtime --sign \"$IDENTITY\" Hyalo.app; echo \"Signed Hyalo.app with: $IDENTITY\"; fi'", depends-on = ["package"] }

# Submit the DMG for Apple notarization.
# Requires: APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID env vars.
notarize = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Hyalo-${VERSION}.dmg\"; if [ ! -f \"$DMG\" ]; then echo \"ERROR: $DMG not found. Run pixi run dmg first.\"; exit 1; fi; if [ -z \"$APPLE_ID\" ] || [ -z \"$APPLE_PASSWORD\" ] || [ -z \"$APPLE_TEAM_ID\" ]; then echo \"ERROR: Set APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID env vars.\"; exit 1; fi; echo \"Submitting $DMG for notarization...\"; xcrun notarytool submit \"$DMG\" --apple-id \"$APPLE_ID\" --password \"$APPLE_PASSWORD\" --team-id \"$APPLE_TEAM_ID\" --wait; echo \"Stapling...\"; xcrun stapler staple \"$DMG\"; echo \"Notarized: $DMG\"'" }

# Generate a changelog from git log since the last tag.
changelog = "bash -c 'TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\"); if [ -z \"$TAG\" ]; then echo \"# Changelog\"; echo \"\"; git log --pretty=format:\"- %s (%h)\" --no-merges; else echo \"# Changelog since $TAG\"; echo \"\"; git log \"${TAG}..HEAD\" --pretty=format:\"- %s (%h)\" --no-merges; fi'"

# Build and launch Emacs with Hyalo module loaded.
run = { cmd = "bash -c 'FEEDSTOCK=\"$HOME/Syntropment/hyalo-feedstock\"; EMACS=\"$FEEDSTOCK/emacs-build-macos/nextstep/Emacs.app/Contents/MacOS/Emacs\"; if [ ! -x \"$EMACS\" ]; then echo \"ERROR: Emacs not found at $EMACS\"; exit 1; fi; DYLIB=\".build/debug/libHyalo.dylib\"; echo \"Launching Emacs with Hyalo...\"; \"$EMACS\" --load \"$DYLIB\" 2>&1 || \"$EMACS\"'", depends-on = ["build"] }

# Build release and launch Emacs with the optimized dylib (no #if DEBUG code).
run-release = { cmd = "bash -c 'FEEDSTOCK=\"$HOME/Syntropment/hyalo-feedstock\"; EMACS=\"$FEEDSTOCK/emacs-build-macos/nextstep/Emacs.app/Contents/MacOS/Emacs\"; if [ ! -x \"$EMACS\" ]; then echo \"ERROR: Emacs not found at $EMACS\"; exit 1; fi; DYLIB=\".build/release/libHyalo.dylib\"; echo \"Launching Emacs with Hyalo (release)...\"; \"$EMACS\" --load \"$DYLIB\" 2>&1 || \"$EMACS\"'", depends-on = ["build-release"] }

# Remove all build artifacts.
distclean = "rm -rf .build Hyalo.app Hyalo-*.dmg DerivedData build && echo 'distclean complete'"
